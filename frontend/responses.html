<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responses — FormBuilder</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/landing.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <link rel="stylesheet" href="/css/responses.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/dashboard.html" class="navbar-brand">
        <div class="navbar-brand-icon">📋</div>
        FormBuilder
      </a>
      <div class="navbar-links">
        <div class="user-chip" id="user-chip"></div>
        <button class="btn btn-ghost btn-icon" id="logout-btn" title="Log out">🚪</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="resp-header">
      <div class="resp-breadcrumb"><a href="/dashboard.html">← Back to dashboard</a></div>
      <div class="resp-title-row">
        <h1 id="form-title">Loading...</h1>
        <div class="flex gap-2">
          <button class="btn btn-secondary" id="share-btn">🔗 Share Link</button>
          <button class="btn btn-secondary" id="export-csv-btn">📥 Export CSV</button>
          <button class="btn btn-secondary" id="export-xlsx-btn">📥 Export Excel</button>
        </div>
      </div>
    </div>

    <div class="stat-cards" id="stat-cards">
      <!-- populated by JS -->
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="responses">Responses</button>
      <button class="tab-btn" data-tab="analytics">Analytics</button>
    </div>

    <!-- Responses Tab -->
    <div id="tab-responses">
      <div class="filters-row">
        <div class="search-bar">
          <input type="text" class="input" id="search-input" placeholder="Search responses..." />
        </div>
        <input type="date" class="input" id="date-from-input" style="max-width:160px;" title="From date" />
        <input type="date" class="input" id="date-to-input" style="max-width:160px;" title="To date" />
        <button class="btn btn-ghost btn-sm" id="clear-filters-btn">Clear filters</button>
      </div>

      <div id="responses-content">
        <div class="page-loading"><div class="spinner spinner-dark"></div></div>
      </div>
    </div>

    <!-- Analytics Tab -->
    <div id="tab-analytics" class="hidden">
      <div class="card chart-card">
        <h3 style="font-size:16px;">Submissions over time</h3>
        <div id="chart-container">
          <div class="page-loading"><div class="spinner spinner-dark"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Share Modal (reused) -->
  <div class="modal-overlay hidden" id="share-modal">
    <div class="modal-box">
      <h3>Share your form</h3>
      <p>Anyone with this link can fill out and submit your form.</p>
      <div class="share-link-box">
        <input type="text" class="input" id="share-link-input" readonly />
        <button class="btn btn-primary" id="copy-link-btn">Copy</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="close-share-modal">Close</button>
      </div>
    </div>
  </div>

  <!-- Response Detail Modal -->
  <div class="modal-overlay hidden" id="detail-modal">
    <div class="modal-box" style="max-width: 560px;">
      <h3>Response details</h3>
      <div id="detail-content" style="margin-top: 14px; max-height: 60vh; overflow-y:auto;"></div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="delete-response-btn">Delete Response</button>
        <button class="btn btn-secondary" id="close-detail-modal">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/responses.js"></script>
</body>
</html>
