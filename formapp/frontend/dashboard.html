<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — FormBuilder</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/landing.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/dashboard.html" class="navbar-brand">
        <div class="navbar-brand-icon">📋</div>
        FormBuilder
      </a>
      <div class="navbar-links">
        <div class="user-chip" id="user-chip"></div>
        <button class="btn btn-ghost btn-icon" id="logout-btn" title="Log out">🚪</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="dash-header">
      <div class="dash-title-row">
        <div>
          <h1>Your Forms</h1>
          <p>Create, manage, and track all your forms in one place</p>
        </div>
        <a href="/builder.html" class="btn btn-primary btn-lg">+ Create New Form</a>
      </div>

      <div class="search-bar">
        <input type="text" class="input" id="search-input" placeholder="Search your forms..." />
      </div>
    </div>

    <div id="forms-container">
      <div class="page-loading">
        <div class="spinner spinner-dark"></div>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div class="modal-overlay hidden" id="share-modal">
    <div class="modal-box">
      <h3>Share your form</h3>
      <p>Anyone with this link can fill out and submit your form.</p>
      <div class="share-link-box">
        <input type="text" class="input" id="share-link-input" readonly />
        <button class="btn btn-primary" id="copy-link-btn">Copy</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="close-share-modal">Close</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal-box">
      <h3>Delete this form?</h3>
      <p>This will permanently delete the form and all of its responses. This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancel-delete-btn">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete-btn">Delete Form</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
