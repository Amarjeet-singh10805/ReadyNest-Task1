<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — FormBuilder</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/landing.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/index.html" class="navbar-brand">
        <div class="navbar-brand-icon">📋</div>
        FormBuilder
      </a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card">
      <h2>Welcome back</h2>
      <p class="auth-sub">Log in to manage your forms</p>

      <div id="error-box" class="auth-error hidden"></div>

      <form id="login-form">
        <div class="field-group">
          <label class="field-label">Email address</label>
          <input type="email" class="input" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field-group">
          <label class="field-label">Password</label>
          <input type="password" class="input" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
          Log in
        </button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="/register.html">Sign up</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    redirectIfAuthed();

    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error-box");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.classList.add("hidden");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in...";

      try {
        const data = await Api.login(email, password);
        Storage.setToken(data.token);
        Storage.setUser(data.user);
        window.location.href = "/dashboard.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
